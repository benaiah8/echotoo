# Prepares the Capacitor iOS project on macOS (web build + cap sync + CocoaPods).
# Does not sign, archive, or upload. Trigger manually until repo secrets are configured.
name: iOS build prep

on:
  workflow_dispatch:

jobs:
  ios-prep:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # @capacitor/cli 8.x declares Node >= 22
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Mirrors local .env (gitignored). Add matching secrets under Settings → Secrets and variables.
      - name: Write .env for Vite
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_PUBLIC_APP_URL: ${{ secrets.VITE_PUBLIC_APP_URL }}
          VITE_GOOGLE_MAPS_KEY: ${{ secrets.VITE_GOOGLE_MAPS_KEY }}
          VITE_LOCATIONIQ_KEY: ${{ secrets.VITE_LOCATIONIQ_KEY }}
          VITE_MEDIA_PROVIDER: ${{ secrets.VITE_MEDIA_PROVIDER }}
          VITE_ALLOW_CLOUDINARY: ${{ secrets.VITE_ALLOW_CLOUDINARY }}
          VITE_SUPPORT_EMAIL: ${{ secrets.VITE_SUPPORT_EMAIL }}
        run: |
          set -eo pipefail
          {
            echo "VITE_SUPABASE_URL=${VITE_SUPABASE_URL}"
            echo "VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}"
            echo "VITE_PUBLIC_APP_URL=${VITE_PUBLIC_APP_URL}"
            echo "VITE_GOOGLE_MAPS_KEY=${VITE_GOOGLE_MAPS_KEY}"
            echo "VITE_LOCATIONIQ_KEY=${VITE_LOCATIONIQ_KEY}"
            echo "VITE_MEDIA_PROVIDER=${VITE_MEDIA_PROVIDER}"
            echo "VITE_ALLOW_CLOUDINARY=${VITE_ALLOW_CLOUDINARY}"
            echo "VITE_SUPPORT_EMAIL=${VITE_SUPPORT_EMAIL}"
          } > .env

      - name: Build web assets
        run: npm run build

      # ios/ is gitignored; generate the native project on the runner when missing.
      - name: Ensure iOS platform exists
        run: |
          set -eo pipefail
          if [ ! -d ios ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: CocoaPods install
        run: |
          set -eo pipefail
          POD_DIR="ios/App"
          if [ -f "$POD_DIR/Podfile" ]; then
            (cd "$POD_DIR" && pod install)
          else
            echo "No Podfile at $POD_DIR/Podfile; skipping pod install."
          fi
