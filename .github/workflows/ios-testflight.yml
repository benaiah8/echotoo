# Builds, signs, archives, exports IPA, and uploads EchoToo to TestFlight (manual).
# Requires repository secrets: signing + App Store Connect API + Vite env (see ios-build-prep).
name: iOS TestFlight

on:
  workflow_dispatch:

jobs:
  testflight:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # @capacitor/cli 8.x declares Node >= 22
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Show Xcode version and SDKs
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Install dependencies
        run: npm ci

      # Mirrors local .env (gitignored). Same pattern as ios-build-prep.yml.
      - name: Write .env for Vite
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_PUBLIC_APP_URL: ${{ secrets.VITE_PUBLIC_APP_URL }}
          VITE_GOOGLE_MAPS_KEY: ${{ secrets.VITE_GOOGLE_MAPS_KEY }}
          VITE_LOCATIONIQ_KEY: ${{ secrets.VITE_LOCATIONIQ_KEY }}
          VITE_MEDIA_PROVIDER: ${{ secrets.VITE_MEDIA_PROVIDER }}
          VITE_ALLOW_CLOUDINARY: ${{ secrets.VITE_ALLOW_CLOUDINARY }}
          VITE_SUPPORT_EMAIL: ${{ secrets.VITE_SUPPORT_EMAIL }}
        run: |
          set -eo pipefail
          # Public defaults — safe to echo. Never echo Supabase/Google secret values.

          vite_media_provider="${VITE_MEDIA_PROVIDER:-}"
          if [ -z "$vite_media_provider" ]; then
            vite_media_provider="supabase"
            echo "Using default VITE_MEDIA_PROVIDER=supabase"
          fi

          vite_allow_cloudinary="${VITE_ALLOW_CLOUDINARY:-}"
          if [ -z "$vite_allow_cloudinary" ]; then
            vite_allow_cloudinary="false"
            echo "Using default VITE_ALLOW_CLOUDINARY=false"
          fi

          vite_support_email="${VITE_SUPPORT_EMAIL:-}"
          if [ -z "$vite_support_email" ]; then
            vite_support_email="support@echotoo.com"
            echo "Using default VITE_SUPPORT_EMAIL=support@echotoo.com"
          fi

          # VITE_LOCATIONIQ_KEY may legitimately stay empty.

          {
            echo "VITE_SUPABASE_URL=${VITE_SUPABASE_URL}"
            echo "VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}"
            echo "VITE_PUBLIC_APP_URL=${VITE_PUBLIC_APP_URL}"
            echo "VITE_GOOGLE_MAPS_KEY=${VITE_GOOGLE_MAPS_KEY}"
            echo "VITE_LOCATIONIQ_KEY=${VITE_LOCATIONIQ_KEY:-}"
            echo "VITE_MEDIA_PROVIDER=${vite_media_provider}"
            echo "VITE_ALLOW_CLOUDINARY=${vite_allow_cloudinary}"
            echo "VITE_SUPPORT_EMAIL=${vite_support_email}"
          } > .env

      - name: Validate Vite env secrets
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_PUBLIC_APP_URL: ${{ secrets.VITE_PUBLIC_APP_URL }}
          VITE_GOOGLE_MAPS_KEY: ${{ secrets.VITE_GOOGLE_MAPS_KEY }}
          VITE_LOCATIONIQ_KEY: ${{ secrets.VITE_LOCATIONIQ_KEY }}
          VITE_MEDIA_PROVIDER: ${{ secrets.VITE_MEDIA_PROVIDER }}
          VITE_ALLOW_CLOUDINARY: ${{ secrets.VITE_ALLOW_CLOUDINARY }}
          VITE_SUPPORT_EMAIL: ${{ secrets.VITE_SUPPORT_EMAIL }}
        run: |
          set -eo pipefail
          # Never echo secret values — only names, public defaults annotations, warnings, errors.

          require_present() {
            local name="$1"
            local val="${!name}"
            if [ -z "$val" ]; then
              echo "::error::Missing $name"
              exit 1
            fi
            echo "$name is present"
          }
          require_https_prefix() {
            local name="$1"
            local val="${!name}"
            case "$val" in
              https://*) ;;
              *)
                echo "::error::$name must start with https://"
                exit 1
                ;;
            esac
          }
          warn_optional_missing() {
            local name="$1"
            local val="${!name}"
            if [ -z "$val" ]; then
              echo "::warning::Optional $name is missing"
              echo "Optional $name is missing"
            else
              echo "Optional $name is present"
            fi
          }

          require_present VITE_SUPABASE_URL
          require_https_prefix VITE_SUPABASE_URL
          require_present VITE_SUPABASE_ANON_KEY
          require_present VITE_PUBLIC_APP_URL
          require_https_prefix VITE_PUBLIC_APP_URL
          require_present VITE_GOOGLE_MAPS_KEY

          warn_optional_missing VITE_LOCATIONIQ_KEY
          warn_optional_missing VITE_MEDIA_PROVIDER
          warn_optional_missing VITE_ALLOW_CLOUDINARY
          warn_optional_missing VITE_SUPPORT_EMAIL

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: CocoaPods install
        run: |
          set -eo pipefail
          POD_DIR="ios/App"
          if [ -f "$POD_DIR/Podfile" ]; then
            (cd "$POD_DIR" && pod install)
          else
            echo "No Podfile at $POD_DIR/Podfile; skipping pod install."
          fi

      - name: Set up signing (keychain, certificate, provisioning profile)
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISION_PROFILE_UUID: ${{ secrets.PROVISION_PROFILE_UUID }}
          PROVISION_PROFILE_NAME: ${{ secrets.PROVISION_PROFILE_NAME }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -eo pipefail
          PROVISION_PROFILE_UUID="$(printf '%s' "$PROVISION_PROFILE_UUID" | tr -d '\r\n')"
          PROVISION_PROFILE_NAME="$(printf '%s' "$PROVISION_PROFILE_NAME" | tr -d '\r\n')"
          APPLE_TEAM_ID="$(printf '%s' "$APPLE_TEAM_ID" | tr -d '\r\n')"

          decode_base64_to_file() {
            local value="$1"
            local out="$2"
            rm -f "$out"
            if printf '%s' "$value" | tr -d '\r\n' | base64 --decode > "$out" 2>/dev/null; then
              :
            elif printf '%s' "$value" | tr -d '\r\n' | base64 -D > "$out"; then
              :
            else
              echo "decode_base64_to_file: base64 decode failed for $out" >&2
              return 1
            fi
            if [ ! -s "$out" ]; then
              echo "decode_base64_to_file: decoded output is empty: $out" >&2
              return 1
            fi
          }

          MP_TMP="${RUNNER_TEMP}/EchoToo_App_Store.mobileprovision"
          decode_base64_to_file "$BUILD_PROVISION_PROFILE_BASE64" "$MP_TMP"

          PROFILE_PLIST="${RUNNER_TEMP}/profile.plist"
          security cms -D -i "$MP_TMP" > "$PROFILE_PLIST"

          PB="/usr/libexec/PlistBuddy"
          PROFILE_UUID_FROM_PLIST="$("$PB" -c "Print :UUID" "$PROFILE_PLIST")"
          PROFILE_NAME_FROM_PLIST="$("$PB" -c "Print :Name" "$PROFILE_PLIST")"
          APP_ID_FROM_PLIST="$("$PB" -c "Print :Entitlements:application-identifier" "$PROFILE_PLIST")"
          TEAM_ID_FROM_PLIST="$("$PB" -c "Print :Entitlements:com.apple.developer.team-identifier" "$PROFILE_PLIST")"
          GET_TASK_ALLOW="$("$PB" -c "Print :Entitlements:get-task-allow" "$PROFILE_PLIST")"

          echo "Provisioning profile validation (non-secret fields):"
          echo "  UUID: ${PROFILE_UUID_FROM_PLIST}"
          echo "  Name: ${PROFILE_NAME_FROM_PLIST}"
          echo "  application-identifier: ${APP_ID_FROM_PLIST}"
          echo "  team-identifier: ${TEAM_ID_FROM_PLIST}"
          echo "  get-task-allow: ${GET_TASK_ALLOW}"

          EXPECTED_APP_ID="${APPLE_TEAM_ID}.com.echotoo.app"
          if [ "$PROFILE_UUID_FROM_PLIST" != "$PROVISION_PROFILE_UUID" ]; then
            echo "Profile UUID mismatch (plist vs secret PROVISION_PROFILE_UUID)." >&2
            exit 1
          fi
          if [ "$PROFILE_NAME_FROM_PLIST" != "$PROVISION_PROFILE_NAME" ]; then
            echo "Profile name mismatch (plist vs secret PROVISION_PROFILE_NAME)." >&2
            exit 1
          fi
          if [ "$APP_ID_FROM_PLIST" != "$EXPECTED_APP_ID" ]; then
            echo "application-identifier mismatch (expected ${APPLE_TEAM_ID}.com.echotoo.app)." >&2
            exit 1
          fi
          if [ "$TEAM_ID_FROM_PLIST" != "$APPLE_TEAM_ID" ]; then
            echo "team-identifier mismatch (plist vs APPLE_TEAM_ID)." >&2
            exit 1
          fi
          if [ "$GET_TASK_ALLOW" != "false" ]; then
            echo "get-task-allow must be false for App Store distribution (got: ${GET_TASK_ALLOW})." >&2
            exit 1
          fi

          PROFILE_DIR="${HOME}/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          cp "$MP_TMP" "${PROFILE_DIR}/${PROFILE_UUID_FROM_PLIST}.mobileprovision"

          KEYCHAIN_PATH="${RUNNER_TEMP}/echotoo-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          P12_PATH="${RUNNER_TEMP}/echotoo_distribution.p12"
          decode_base64_to_file "$BUILD_CERTIFICATE_BASE64" "$P12_PATH"

          security import "$P12_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          echo "Codesigning identities in CI keychain (diagnostic):"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          rm -f "$P12_PATH"

      - name: Archive (Release)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROVISION_PROFILE_NAME: ${{ secrets.PROVISION_PROFILE_NAME }}
        run: |
          set -eo pipefail
          xcodebuild archive \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "${RUNNER_TEMP}/EchoToo.xcarchive" \
            MARKETING_VERSION=1.0 \
            CURRENT_PROJECT_VERSION="${GITHUB_RUN_NUMBER}" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="$PROVISION_PROFILE_NAME" \
            CODE_SIGN_IDENTITY="Apple Distribution"

      - name: Write ExportOptions.plist
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROVISION_PROFILE_NAME: ${{ secrets.PROVISION_PROFILE_NAME }}
        run: |
          set -eo pipefail
          OUT="${RUNNER_TEMP}/ExportOptions.plist"
          {
            echo '<?xml version="1.0" encoding="UTF-8"?>'
            echo '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">'
            echo '<plist version="1.0">'
            echo '<dict>'
            echo '  <key>method</key>'
            echo '  <string>app-store</string>'
            echo '  <key>teamID</key>'
            echo "  <string>${APPLE_TEAM_ID}</string>"
            echo '  <key>signingStyle</key>'
            echo '  <string>manual</string>'
            echo '  <key>provisioningProfiles</key>'
            echo '  <dict>'
            echo '    <key>com.echotoo.app</key>'
            echo "    <string>${PROVISION_PROFILE_NAME}</string>"
            echo '  </dict>'
            echo '  <key>uploadSymbols</key>'
            echo '  <true/>'
            echo '  <key>uploadBitcode</key>'
            echo '  <false/>'
            echo '  <key>compileBitcode</key>'
            echo '  <false/>'
            echo '</dict>'
            echo '</plist>'
          } > "$OUT"

      - name: Export IPA
        run: |
          set -eo pipefail
          EXPORT_DIR="${RUNNER_TEMP}/ipa_export"
          mkdir -p "$EXPORT_DIR"
          xcodebuild -exportArchive \
            -archivePath "${RUNNER_TEMP}/EchoToo.xcarchive" \
            -exportPath "$EXPORT_DIR" \
            -exportOptionsPlist "${RUNNER_TEMP}/ExportOptions.plist"

          IPA_PATH="$(find "$EXPORT_DIR" -maxdepth 1 -name '*.ipa' | head -n 1)"
          if [ -z "$IPA_PATH" ] || [ ! -f "$IPA_PATH" ]; then
            echo "No IPA found under $EXPORT_DIR"
            ls -la "$EXPORT_DIR"
            exit 1
          fi
          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"

      - name: Write App Store Connect API key
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          set -eo pipefail
          mkdir -p "${HOME}/private_keys"
          KEY_PATH="${HOME}/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          printf '%s\n' "$APP_STORE_CONNECT_PRIVATE_KEY" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"

      - name: Upload IPA to App Store Connect (TestFlight)
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -eo pipefail
          xcrun altool --upload-app \
            --type ios \
            --file "${IPA_PATH}" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: echotoo-ios-ipa
          path: ${{ runner.temp }}/ipa_export/*.ipa
          if-no-files-found: ignore

      - name: Tear down signing keychain
        if: always()
        run: |
          set +e
          KEYCHAIN_PATH="${RUNNER_TEMP}/echotoo-signing.keychain-db"
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
