# Generates Capacitor ios/ on macOS and uploads it as an artifact for offline commit (e.g. from Windows).
# Does not sign, archive, or upload to App Store / TestFlight.
name: Generate iOS project

on:
  workflow_dispatch:

jobs:
  generate-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # @capacitor/cli 8.x declares Node >= 22
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Mirrors local .env (gitignored). Add matching secrets under Settings → Secrets and variables.
      - name: Write .env for Vite
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_PUBLIC_APP_URL: ${{ secrets.VITE_PUBLIC_APP_URL }}
          VITE_GOOGLE_MAPS_KEY: ${{ secrets.VITE_GOOGLE_MAPS_KEY }}
          VITE_GOOGLE_WEB_CLIENT_ID: ${{ secrets.VITE_GOOGLE_WEB_CLIENT_ID }}
          VITE_GOOGLE_IOS_CLIENT_ID: ${{ secrets.VITE_GOOGLE_IOS_CLIENT_ID }}
          VITE_LOCATIONIQ_KEY: ${{ secrets.VITE_LOCATIONIQ_KEY }}
          VITE_MEDIA_PROVIDER: ${{ secrets.VITE_MEDIA_PROVIDER }}
          VITE_ALLOW_CLOUDINARY: ${{ secrets.VITE_ALLOW_CLOUDINARY }}
          VITE_SUPPORT_EMAIL: ${{ secrets.VITE_SUPPORT_EMAIL }}
        run: |
          set -eo pipefail
          {
            echo "VITE_SUPABASE_URL=${VITE_SUPABASE_URL}"
            echo "VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}"
            echo "VITE_PUBLIC_APP_URL=${VITE_PUBLIC_APP_URL}"
            echo "VITE_GOOGLE_MAPS_KEY=${VITE_GOOGLE_MAPS_KEY}"
            echo "VITE_GOOGLE_WEB_CLIENT_ID=${VITE_GOOGLE_WEB_CLIENT_ID}"
            echo "VITE_GOOGLE_IOS_CLIENT_ID=${VITE_GOOGLE_IOS_CLIENT_ID}"
            echo "VITE_LOCATIONIQ_KEY=${VITE_LOCATIONIQ_KEY}"
            echo "VITE_MEDIA_PROVIDER=${VITE_MEDIA_PROVIDER}"
            echo "VITE_ALLOW_CLOUDINARY=${VITE_ALLOW_CLOUDINARY}"
            echo "VITE_SUPPORT_EMAIL=${VITE_SUPPORT_EMAIL}"
          } > .env

      - name: Build web assets
        run: npm run build

      - name: Ensure iOS platform exists
        run: |
          set -eo pipefail
          if [ ! -d ios ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: CocoaPods install
        run: |
          set -eo pipefail
          POD_DIR="ios/App"
          if [ -f "$POD_DIR/Podfile" ]; then
            (cd "$POD_DIR" && pod install)
          else
            echo "No Podfile at $POD_DIR/Podfile; skipping pod install."
          fi

      - name: Add ios/.gitignore and strip generated artifacts
        run: |
          set -eo pipefail
          printf '%s\n' \
            '# CocoaPods (regenerate with: cd ios/App && pod install)' \
            'Pods/' \
            '' \
            '# Xcode user data' \
            'xcuserdata/' \
            '*.xcuserstate' \
            '' \
            '# Build outputs / archives (CI/Xcode will recreate)' \
            'build/' \
            'DerivedData/' \
            '*.ipa' \
            '*.dSYM' \
            '*.dSYM.zip' \
            '' \
            '# OS / tooling noise' \
            '.DS_Store' \
            '' \
            '# Swift Package Manager (if added later)' \
            '.swiftpm/' \
            > ios/.gitignore

          # Paths excluded before artifact upload (Pods documented above + regenerated locally/on CI)
          rm -rf ios/App/Pods 2>/dev/null || true
          find ios -type d -name xcuserdata -exec rm -rf {} + 2>/dev/null || true
          find ios -type d -name build -exec rm -rf {} + 2>/dev/null || true
          find ios -type d -name DerivedData -exec rm -rf {} + 2>/dev/null || true
          find ios -name '.DS_Store' -delete 2>/dev/null || true
          find ios \( -name '*.ipa' -o -name '*.dSYM' -o -name '*.dSYM.zip' \) -delete 2>/dev/null || true

      - name: Upload ios/ artifact
        uses: actions/upload-artifact@v4
        with:
          name: echotoo-ios-project
          path: ios/
          if-no-files-found: error
